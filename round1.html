<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Mega Scramble</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Bubblegum Sans', cursive;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #FFFFFF;
            padding: 15px;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 1;
            animation: slideIn 0.8s ease-out;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 10px;
        }

        .logo {
            max-width: 700px;
            width: 90%;
            margin: 0 auto;
            display: block;
        }

        /* ===== CLASS SELECTOR SECTION (DROPDOWN) ===== */
        .class-selector {
            margin: 10px auto 20px auto;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
            transition: all 0.3s ease;
        }

        .class-dropdown {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            padding: 12px 25px;
            border: 3px solid #ffd700;
            border-radius: 50px;
            background: #1a3a5f;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
            text-align: center;
        }

        .class-dropdown:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            background: #0f2a44;
        }

        .class-dropdown option {
            background: white;
            color: #333;
        }

        /* ===== MODE BUTTONS SECTION ===== */
        .mode-buttons {
            display: flex;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .mode-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            padding: 20px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            flex: 1 1 auto;
            min-width: 250px;
            max-width: 350px;
            line-height: 1.3;
            text-align: center;
            opacity: 0.6;
            pointer-events: none;
        }

        .mode-btn.active-mode {
            opacity: 1;
            pointer-events: auto;
            cursor: pointer;
        }

        .mode-btn.team-mode {
            background: linear-gradient(145deg, #1A3A5F, #0F2A44);
            border: 2px solid #2B4F7C;
        }

        .mode-btn.battle-mode {
            background: linear-gradient(145deg, #6B4E9E, #4A2C7A);
            border: 2px solid #8A6CC7;
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .mode-btn.active-mode:hover::before {
            width: 600px;
            height: 600px;
        }

        .mode-btn.active-mode:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            filter: brightness(1.1);
        }

        .mode-btn.active-mode:active {
            transform: translateY(0) scale(0.98);
        }

        .mode-icon {
            font-size: 28px;
            margin-right: 12px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        /* Start Button - Centered below mode buttons */
        .start-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px auto 20px auto;
        }

        .start-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 32px;
            padding: 20px 60px;
            border: none;
            border-radius: 80px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.25);
            color: white;
            background: linear-gradient(145deg, #e67e22, #d35400);
            border: 3px solid #f39c12;
            display: inline-block;
            min-width: 280px;
        }

        .start-btn:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.3);
            filter: brightness(1.05);
        }

        .start-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .tagline {
            font-size: 22px;
            color: #666;
            margin: 15px 0;
            font-family: 'Fredoka One', cursive;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            letter-spacing: 2px;
        }

        .selected-info {
            font-size: 16px;
            color: #2e7d32;
            margin-top: 20px;
            font-weight: bold;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 30px;
            display: inline-block;
        }

        /* ===== TABLET & MOBILE OPTIMIZATIONS ===== */
        @media (max-width: 1024px) {
            .container {
                padding: 5px;
            }
            
            .logo {
                max-width: 600px;
                width: 85%;
            }
            
            .class-dropdown {
                font-size: 18px;
                padding: 10px 20px;
                min-width: 180px;
            }
            
            .start-btn {
                font-size: 28px;
                padding: 16px 50px;
                min-width: 260px;
            }
            
            .mode-btn {
                font-size: 18px;
                padding: 18px 25px;
                min-width: 220px;
            }
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding-top: 30px;
            }
            
            .container {
                padding: 5px;
            }
            
            .logo {
                max-width: 500px;
                width: 80%;
                margin-bottom: 5px;
            }
            
            .tagline {
                font-size: 18px;
                margin: 10px 0;
            }
            
            .class-selector {
                flex-direction: column;
                gap: 10px;
                margin: 5px auto 15px auto;
            }
            
            .class-dropdown {
                width: 250px;
                font-size: 16px;
                padding: 12px 20px;
            }
            
            .mode-buttons {
                flex-direction: column;
                gap: 15px;
                align-items: center;
                margin-bottom: 20px;
            }
            
            .mode-btn {
                font-size: 18px;
                padding: 18px 20px;
                min-width: 280px;
                width: 100%;
                max-width: 320px;
            }
            
            .mode-icon {
                font-size: 24px;
                margin-right: 10px;
            }
            
            .start-btn {
                font-size: 24px;
                padding: 14px 40px;
                min-width: 240px;
            }
            
            .selected-info {
                font-size: 14px;
                padding: 8px 15px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                max-width: 400px;
                width: 95%;
            }
            
            .tagline {
                font-size: 16px;
            }
            
            .class-dropdown {
                width: 220px;
                font-size: 14px;
                padding: 10px 15px;
            }
            
            .mode-btn {
                font-size: 16px;
                padding: 15px 15px;
                min-width: 240px;
            }
            
            .mode-icon {
                font-size: 22px;
                margin-right: 8px;
            }
            
            .start-btn {
                font-size: 20px;
                padding: 12px 30px;
                min-width: 200px;
            }
        }

        /* Landscape orientation on tablets */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                align-items: center;
                padding: 10px;
            }
            
            .container {
                padding: 5px;
            }
            
            .logo {
                max-width: 400px;
                width: 60%;
            }
            
            .tagline {
                margin: 5px 0;
                font-size: 16px;
            }
            
            .class-selector {
                flex-direction: row;
                margin: 5px auto;
            }
            
            .class-dropdown {
                padding: 8px 15px;
                font-size: 14px;
                min-width: 120px;
            }
            
            .mode-buttons {
                flex-direction: row;
                margin-bottom: 15px;
            }
            
            .mode-btn {
                padding: 12px 15px;
                font-size: 14px;
                min-width: 180px;
            }
            
            .start-btn {
                font-size: 18px;
                padding: 10px 30px;
                min-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="Mega Scramble.png" alt="Mega Scramble" class="logo">
        </div>
        
        <div class="tagline">Fix the mix!</div>

        <!-- CLASS SELECTOR - DROPDOWN -->
        <div class="class-selector">
            <select id="classDropdown" class="class-dropdown">
                <option value="">-- Select Class --</option>
                <option value="2pm">2:00 PM Class (A1)</option>
                <option value="3pm">3:00 PM Class (A1)</option>
                <option value="4pm">4:00 PM Class (High A2)</option>
                <option value="5pm">5:00 PM Class (Pre A1)</option>
            </select>
        </div>

        <!-- TWO GAME MODE BUTTONS -->
        <div class="mode-buttons">
            <a href="mode1.html" class="mode-btn team-mode" id="teamBuzzLink">
                <span class="mode-icon">🎯</span>
                Round 1:<br>Team Buzz
            </a>
            <a href="mode2.html" class="mode-btn battle-mode" id="ultimateBattleLink">
                <span class="mode-icon">👑</span>
                Round 2:<br>Ultimate Battle
            </a>
        </div>

        <!-- START BUTTON - CENTERED BELOW MODE BUTTONS -->
        <div class="start-wrapper">
            <button class="start-btn" id="startBtn">🚀 START!</button>
        </div>

        <div id="selectedInfo" class="selected-info"></div>
    </div>

    <script>
        // CSV files for each class (with headers: Question #, Scrambled sentence, Answer)
        const CSV_FILES = {
            '2pm': '2pm.csv',
            '3pm': '3pm.csv',
            '4pm': '4pm.csv',
            '5pm': '5pm.csv'
        };
        
        // Get elements
        const classDropdown = document.getElementById('classDropdown');
        const startBtn = document.getElementById('startBtn');
        const teamBuzzLink = document.getElementById('teamBuzzLink');
        const ultimateBattleLink = document.getElementById('ultimateBattleLink');
        const selectedInfo = document.getElementById('selectedInfo');
        
        let selectedClass = localStorage.getItem('megaScrambleClass') || '';
        let gameStarted = false;
        
        // Function to update mode button states
        function updateModeButtons() {
            if (gameStarted && selectedClass) {
                teamBuzzLink.classList.add('active-mode');
                ultimateBattleLink.classList.add('active-mode');
            } else {
                teamBuzzLink.classList.remove('active-mode');
                ultimateBattleLink.classList.remove('active-mode');
            }
        }
        
        // Function to set active class
        function setActiveClass(classValue) {
            selectedClass = classValue;
            if (classValue) {
                localStorage.setItem('megaScrambleClass', classValue);
                localStorage.setItem('megaScrambleCSV', CSV_FILES[classValue]);
                selectedInfo.innerHTML = `✅ Class selected: ${classValue.toUpperCase()} (${CSV_FILES[classValue]})<br>📋 CSV includes headers: Question #, Scrambled sentence, Answer`;
                selectedInfo.style.color = '#2e7d32';
                selectedInfo.style.background = '#e8f5e9';
            } else {
                localStorage.removeItem('megaScrambleClass');
                localStorage.removeItem('megaScrambleCSV');
                selectedInfo.innerHTML = '';
            }
        }
        
        // Handle Start button click
        startBtn.addEventListener('click', function() {
            const selectedOption = classDropdown.value;
            
            if (!selectedOption) {
                alert('⚠️ Please select a class first! (2pm, 3pm, 4pm, or 5pm)');
                return;
            }
            
            gameStarted = true;
            setActiveClass(selectedOption);
            updateModeButtons();
            
            // Visual feedback
            startBtn.style.background = "linear-gradient(145deg, #27ae60, #1e8449)";
            startBtn.innerHTML = "✅ READY!";
            
            setTimeout(() => {
                startBtn.innerHTML = "🚀 START!";
                startBtn.style.background = "linear-gradient(145deg, #e67e22, #d35400)";
            }, 2000);
        });
        
        // Handle mode links - ensure class is selected AND game has started
        teamBuzzLink.addEventListener('click', function(e) {
            if (!gameStarted || !selectedClass) {
                e.preventDefault();
                alert('⚠️ Please select a class and click START! first.');
            }
        });
        
        ultimateBattleLink.addEventListener('click', function(e) {
            if (!gameStarted || !selectedClass) {
                e.preventDefault();
                alert('⚠️ Please select a class and click START! first.');
            }
        });
        
        // Restore previous selection if exists
        if (selectedClass) {
            classDropdown.value = selectedClass;
            gameStarted = true;
            setActiveClass(selectedClass);
            updateModeButtons();
        }
        
        // Reset game started if dropdown changes
        classDropdown.addEventListener('change', function() {
            gameStarted = false;
            updateModeButtons();
            setActiveClass('');
            startBtn.innerHTML = "🚀 START!";
            startBtn.style.background = "linear-gradient(145deg, #e67e22, #d35400)";
        });
    </script>
</body>
</html>
