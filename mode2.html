<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mega Scramble - Round 2: Ultimate Battle</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bubblegum+Sans&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Bubblegum Sans', cursive;
            background: linear-gradient(135deg, #1A3A5F, #0F2A44);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* TOP TIMER BAR */
        .timer-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 1cm;
            background: rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .timer-bar {
            width: 100%;
            height: 100%;
            background: #FFD700;
            position: absolute;
            top: 0;
            right: 0;
            animation: countdown 900s linear forwards;
            box-shadow: 0 0 10px #FFD700;
        }

        @keyframes countdown {
            from { width: 100%; right: 0; }
            to { width: 0%; right: 0; }
        }

        /* MAIN CONTAINER - CENTERED */
        .battle-container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 900px;
            width: 95%;
            margin: 20px auto;
            text-align: center;
            border: 3px solid #FFD700;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .stage-title {
            font-family: 'Fredoka One', cursive;
            font-size: 36px;
            color: #1A3A5F;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #FFD700;
        }

        .class-badge {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
            background: #f0f0f0;
            display: inline-block;
            padding: 5px 25px;
            border-radius: 50px;
        }

        .class-badge span {
            font-weight: bold;
            color: #1A3A5F;
        }

        .question-number {
            font-family: 'Fredoka One', cursive;
            font-size: 22px;
            color: #4ECDC4;
            margin-bottom: 15px;
        }

        /* CENTERED QUESTION BOX */
        .question-box {
            background: linear-gradient(135deg, #1A3A5F, #2B4F7C);
            border-radius: 25px;
            padding: 40px 30px;
            color: white;
            margin-bottom: 25px;
            border: 3px solid #FFD700;
            text-align: center;
        }

        .scrambled-label {
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            color: #FFD700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .scrambled-sentence {
            font-size: 36px;
            line-height: 1.4;
            word-wrap: break-word;
            font-weight: bold;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        /* CENTERED ANSWER BOX */
        .answer-section {
            background: #f8f9fa;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            display: none;
            border: 3px solid #4ECDC4;
            text-align: center;
        }

        .answer-label {
            font-family: 'Fredoka One', cursive;
            font-size: 26px;
            color: #4ECDC4;
            margin-bottom: 10px;
        }

        .answer-text {
            font-size: 32px;
            color: #1A3A5F;
            padding: 20px;
            background: white;
            border-radius: 15px;
            border: 3px solid #4ECDC4;
            word-wrap: break-word;
            font-weight: bold;
        }

        /* SIMPLE STATUS - JUST ROUND COUNTER */
        .round-status {
            background: linear-gradient(145deg, #FFD700, #FDB931);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            margin-bottom: 25px;
            font-size: 20px;
            font-weight: bold;
            color: #1A3A5F;
        }

        /* CONTROL BUTTONS */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .control-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 22px;
            padding: 14px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: all 0.1s ease;
            min-width: 160px;
        }

        .control-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        .btn-show { 
            background: #4ECDC4; 
            box-shadow: 0 5px 0 #2A8F87;
        }
        .btn-next { 
            background: #FFD700; 
            color: #333;
            box-shadow: 0 5px 0 #C4A000;
        }
        .btn-home { 
            background: #95a5a6; 
            box-shadow: 0 5px 0 #6C7A7D;
        }

        .hidden { display: none !important; }

        /* MODAL FOR END OF GAME */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: modalPop 0.5s ease-out;
            border: 5px solid #FFD700;
        }

        @keyframes modalPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-icon { font-size: 80px; margin-bottom: 20px; }
        .modal-content h2 { font-family: 'Fredoka One', cursive; font-size: 42px; color: #1A3A5F; margin-bottom: 20px; }
        .modal-content p { font-size: 24px; margin-bottom: 30px; color: #333; }

        .modal-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            padding: 12px 40px;
            background: linear-gradient(145deg, #1A3A5F, #0F2A44);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #0A1A2F;
        }

        .modal-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0A1A2F;
        }

        @media (max-width: 768px) {
            .stage-title { font-size: 28px; }
            .scrambled-sentence { font-size: 24px; }
            .answer-text { font-size: 22px; }
            .control-btn { font-size: 18px; padding: 10px 20px; min-width: 130px; }
            .question-box { padding: 25px 20px; }
        }
    </style>
</head>
<body>

<!-- TOP TIMER BAR -->
<div class="timer-container">
    <div class="timer-bar"></div>
</div>

<div class="battle-container">
    <h1 class="stage-title">👑 ROUND 2: ULTIMATE BATTLE</h1>
    <div class="class-badge" id="classDisplay">Loading class...</div>

    <div class="question-number" id="questionNumber"></div>

    <!-- CENTERED QUESTION BOX -->
    <div class="question-box">
        <div class="scrambled-label">🔀 SCRAMBLED SENTENCE</div>
        <div class="scrambled-sentence" id="scrambledSentence">Loading questions...</div>
    </div>

    <!-- CENTERED ANSWER BOX -->
    <div class="answer-section" id="answerSection">
        <div class="answer-label">✓ CORRECT ANSWER</div>
        <div class="answer-text" id="answerText"></div>
    </div>

    <!-- SIMPLE ROUND STATUS -->
    <div class="round-status" id="roundStatus">
        📋 Ready to begin!
    </div>

    <!-- CONTROL BUTTONS -->
    <div class="controls">
        <button class="control-btn btn-show" id="showAnswerBtn">Show Answer</button>
        <button class="control-btn btn-next hidden" id="nextBtn">Next Round ➤</button>
        <button class="control-btn btn-home" onclick="location.href='index.html'">Home</button>
    </div>
</div>

<!-- MODAL FOR COMPLETION -->
<div class="modal-overlay" id="completeModal">
    <div class="modal-content">
        <div class="modal-icon">🏆</div>
        <h2>BATTLE COMPLETE!</h2>
        <p>Great job, everyone!</p>
        <button class="modal-btn" id="completeOkBtn">OK</button>
    </div>
</div>

<script>
let questions = [];
let currentIndex = 0;
let timerTimeout;
let gameActive = true;

const classNames = {
    '2pm': '2:00 PM Class (A1)',
    '3pm': '3:00 PM Class (A1)',
    '4pm': '4:00 PM Class (High A2)',
    '5pm': '5:00 PM Class (Pre A1)'
};

// Fisher-Yates shuffle algorithm - GUARANTEES random order
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

$(document).ready(function () {
    const selectedClass = localStorage.getItem('megaScrambleClass');
    const selectedCSV = localStorage.getItem('megaScrambleCSV');
    
    if (!selectedClass || !selectedCSV) {
        alert('⚠️ No class selected. Please go back and select a class.');
        window.location.href = 'index.html';
        return;
    }
    
    const displayName = classNames[selectedClass] || selectedClass.toUpperCase();
    $('#classDisplay').html(`Class: <span>${displayName}</span>`);
    
    const url = selectedCSV + '?t=' + new Date().getTime();
    
    Papa.parse(url, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            if (results.data && results.data.length > 0) {
                questions = results.data
                    .filter(row => row['Scrambled sentence'] && row['Answer'])
                    .map(row => ({
                        scrambled: row['Scrambled sentence'].trim(),
                        correct: row['Answer'].trim()
                    }));
                
                if (questions.length > 0) {
                    // 🔀 ENSURE RANDOM ORDER - SHUFFLE QUESTIONS!
                    questions = shuffleArray(questions);
                    console.log('Questions shuffled. Total:', questions.length);
                    
                    showQuestion();
                    
                    // Start 15-minute timer
                    timerTimeout = setTimeout(function() {
                        if (gameActive) showCompleteModal();
                    }, 900000);
                    
                    $('.timer-bar').on('animationend', function() {
                        if (gameActive) showCompleteModal();
                    });
                } else {
                    alert('No valid questions found. Check your CSV format.');
                }
            } else {
                alert('Could not load questions.');
            }
        },
        error: function(error) {
            alert('Could not load CSV file: ' + selectedCSV);
        }
    });
});

function showQuestion() {
    if (!gameActive) return;
    
    if (currentIndex >= questions.length) {
        showCompleteModal();
        return;
    }

    const q = questions[currentIndex];
    
    $('#questionNumber').text(`Round ${currentIndex + 1} of ${questions.length}`);
    $('#scrambledSentence').text(q.scrambled);
    $('#answerText').text(q.correct);
    $('#roundStatus').html(`📋 Round ${currentIndex + 1} of ${questions.length} - Waiting for answers...`);
    
    // Hide answer section and reset buttons
    $('#answerSection').hide();
    $('#showAnswerBtn').removeClass('hidden');
    $('#nextBtn').addClass('hidden');
}

function showCompleteModal() {
    if (!gameActive) return;
    gameActive = false;
    clearTimeout(timerTimeout);
    $('.timer-bar').css('animation-play-state', 'paused');
    $('#completeModal').fadeIn(300).css('display', 'flex');
}

$('#showAnswerBtn').on('click', function () {
    $('#answerSection').slideDown(300);
    $('#roundStatus').html(`✅ Correct answer shown! Eliminate students who got it wrong.`);
    $(this).addClass('hidden');
    $('#nextBtn').removeClass('hidden');
});

$('#nextBtn').on('click', function () {
    currentIndex++;
    showQuestion();
});

$('#completeOkBtn').on('click', function() {
    location.href = 'index.html';
});

window.addEventListener('beforeunload', function() {
    clearTimeout(timerTimeout);
});
</script>

</body>
</html>
