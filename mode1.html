<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mega Scramble - Round 1: Team Buzz</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bubblegum+Sans&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Bubblegum Sans', cursive;
            background: linear-gradient(135deg, #1A3A5F, #0F2A44);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow: auto;
        }

        /* TOP TIMER BAR */
        .timer-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 1cm;
            background: rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .timer-bar {
            width: 100%;
            height: 100%;
            background: #FFD700;
            position: absolute;
            top: 0;
            right: 0;
            animation: countdown 900s linear forwards;
            box-shadow: 0 0 10px #FFD700;
        }

        @keyframes countdown {
            from { width: 100%; right: 0; }
            to { width: 0%; right: 0; }
        }

        /* MAIN CARD - COMPACT, FITS ON SCREEN */
        .question-container {
            background: white;
            border-radius: 25px;
            padding: 20px 25px;
            max-width: 1000px;
            width: 95%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            margin: 20px auto;
            max-height: 90vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border: 3px solid #FFD700;
        }

        .stage-title {
            font-family: 'Fredoka One', cursive;
            font-size: 32px;
            color: #1A3A5F;
            margin-bottom: 5px;
            flex-shrink: 0;
            text-shadow: 2px 2px 0 #FFD700;
        }

        .class-badge {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
            flex-shrink: 0;
            background: #f0f0f0;
            display: inline-block;
            padding: 4px 20px;
            border-radius: 50px;
            margin-top: 3px;
        }

        .class-badge span {
            font-weight: bold;
            color: #1A3A5F;
        }

        .question-number {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            color: #4ECDC4;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .question-box {
            background: linear-gradient(135deg, #1A3A5F, #2B4F7C);
            border-radius: 18px;
            padding: 20px;
            color: white;
            margin-bottom: 15px;
            flex-shrink: 0;
            border: 2px solid #FFD700;
        }

        .scrambled-label {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            color: #FFD700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .scrambled-sentence {
            font-size: 28px;
            margin-bottom: 10px;
            line-height: 1.3;
            word-wrap: break-word;
            font-weight: bold;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .answer-section {
            background: #f8f9fa;
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
            flex-shrink: 0;
            border: 2px solid #4ECDC4;
        }

        .answer-label {
            font-family: 'Fredoka One', cursive;
            font-size: 22px;
            color: #4ECDC4;
            margin-bottom: 8px;
        }

        .answer-text {
            font-size: 26px;
            color: #1A3A5F;
            padding: 12px;
            background: white;
            border-radius: 12px;
            border: 2px solid #4ECDC4;
            word-wrap: break-word;
            font-weight: bold;
        }

        .team-stats {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            padding: 12px;
            background: linear-gradient(145deg, #FFD700, #FDB931);
            border-radius: 18px;
            color: #1A3A5F;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 10px;
            flex-shrink: 0;
        }

        .team-stat {
            font-size: 18px;
            text-align: center;
            min-width: 90px;
        }

        .team-stat span {
            font-size: 24px;
            margin-right: 6px;
        }

        .team-stat input {
            width: 65px;
            padding: 5px;
            font-size: 16px;
            text-align: center;
            font-family: 'Fredoka One', cursive;
            border: 2px solid #1A3A5F;
            border-radius: 10px;
            margin-left: 6px;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
            padding: 12px 0 5px 0;
            background: white;
            border-top: 2px solid #f0f0f0;
            flex-shrink: 0;
        }

        .control-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: all 0.1s ease;
            min-width: 140px;
        }

        .control-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
        }

        .btn-show { 
            background: #4ECDC4; 
            box-shadow: 0 4px 0 #2A8F87;
        }
        .btn-next { 
            background: #FFD700; 
            color: #333;
            box-shadow: 0 4px 0 #C4A000;
        }
        .btn-home { 
            background: #95a5a6; 
            box-shadow: 0 4px 0 #6C7A7D;
        }

        .hidden { display: none !important; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 35px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: modalPop 0.5s ease-out;
            border: 5px solid #FFD700;
        }

        @keyframes modalPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-icon { font-size: 70px; margin-bottom: 15px; }
        .modal-content h2 { font-family: 'Fredoka One', cursive; font-size: 38px; color: #1A3A5F; margin-bottom: 15px; }
        .modal-content p { font-size: 22px; margin-bottom: 25px; color: #333; }

        .modal-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 22px;
            padding: 10px 35px;
            background: linear-gradient(145deg, #1A3A5F, #0F2A44);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #0A1A2F;
        }

        .modal-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0A1A2F;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .stage-title { font-size: 26px; }
            .scrambled-sentence { font-size: 22px; }
            .answer-text { font-size: 20px; }
            .control-btn { font-size: 16px; padding: 8px 18px; min-width: 120px; }
            .team-stat { font-size: 14px; }
            .team-stat span { font-size: 20px; }
            .team-stat input { width: 55px; font-size: 14px; }
            .question-box { padding: 15px; }
        }

        @media (max-width: 480px) {
            .scrambled-sentence { font-size: 18px; }
            .answer-text { font-size: 16px; }
            .control-btn { font-size: 14px; padding: 6px 12px; min-width: 100px; }
        }
    </style>
</head>
<body>

<!-- TOP TIMER BAR -->
<div class="timer-container">
    <div class="timer-bar"></div>
</div>

<div class="question-container">
    <h1 class="stage-title">🎯 ROUND 1: TEAM BUZZ</h1>
    <div class="class-badge" id="classDisplay">Loading class...</div>

    <div class="question-number" id="questionNumber"></div>

    <div class="question-box">
        <div class="scrambled-label">🔀 SCRAMBLED SENTENCE</div>
        <div class="scrambled-sentence" id="scrambledSentence">Loading questions...</div>
    </div>

    <div class="team-stats" id="teamStats">
        <div class="team-stat"><span>🔴 Team A</span> <input type="number" id="scoreA" value="0" min="0" step="1"></div>
        <div class="team-stat"><span>🔵 Team B</span> <input type="number" id="scoreB" value="0" min="0" step="1"></div>
        <div class="team-stat"><span>🟢 Team C</span> <input type="number" id="scoreC" value="0" min="0" step="1"></div>
        <div class="team-stat"><span>🟡 Team D</span> <input type="number" id="scoreD" value="0" min="0" step="1"></div>
    </div>

    <div class="answer-section" id="answerSection">
        <div class="answer-label">✓ CORRECT ANSWER</div>
        <div class="answer-text" id="answerText"></div>
    </div>

    <div class="controls">
        <button class="control-btn btn-show" id="showAnswerBtn">Show Answer</button>
        <button class="control-btn btn-next hidden" id="nextBtn">Next Question ➤</button>
        <button class="control-btn btn-home" onclick="location.href='index.html'">Home</button>
    </div>
</div>

<div class="modal-overlay" id="timesUpModal">
    <div class="modal-content">
        <div class="modal-icon">⏰</div>
        <h2>TIME'S UP!</h2>
        <p>The team battle has ended</p>
        <button class="modal-btn" id="modalOkBtn">OK</button>
    </div>
</div>

<div class="modal-overlay" id="completeModal">
    <div class="modal-content">
        <div class="modal-icon">🏆</div>
        <h2>BATTLE COMPLETE!</h2>
        <p>Great job, teams!</p>
        <button class="modal-btn" id="completeOkBtn">OK</button>
    </div>
</div>

<script>
let questions = [];
let currentIndex = 0;
let timerTimeout;

const classNames = {
    '2pm': '2:00 PM Class (A1)',
    '3pm': '3:00 PM Class (A1)',
    '4pm': '4:00 PM Class (High A2)',
    '5pm': '5:00 PM Class (Pre A1)'
};

$(document).ready(function () {
    const selectedClass = localStorage.getItem('megaScrambleClass');
    const selectedCSV = localStorage.getItem('megaScrambleCSV');
    
    if (!selectedClass || !selectedCSV) {
        alert('⚠️ No class selected. Please go back and select a class.');
        window.location.href = 'index.html';
        return;
    }
    
    const displayName = classNames[selectedClass] || selectedClass.toUpperCase();
    $('#classDisplay').html(`Class: <span>${displayName}</span>`);
    
    const url = selectedCSV + '?t=' + new Date().getTime();
    
    Papa.parse(url, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            if (results.data && results.data.length > 0) {
                questions = results.data
                    .filter(row => row['Scrambled sentence'] && row['Answer'])
                    .map(row => ({
                        scrambled: row['Scrambled sentence'].trim(),
                        correct: row['Answer'].trim()
                    }));
                
                if (questions.length > 0) {
                    // Shuffle questions
                    for (let i = questions.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [questions[i], questions[j]] = [questions[j], questions[i]];
                    }
                    showQuestion();
                    
                    timerTimeout = setTimeout(function() {
                        showTimesUpModal();
                    }, 900000);
                    
                    $('.timer-bar').on('animationend', function() {
                        showTimesUpModal();
                    });
                } else {
                    alert('No valid questions found. Check your CSV format.');
                }
            } else {
                alert('Could not load questions.');
            }
        },
        error: function(error) {
            alert('Could not load CSV file: ' + selectedCSV);
        }
    });
});

function showQuestion() {
    if (currentIndex >= questions.length) {
        clearTimeout(timerTimeout);
        showCompleteModal();
        return;
    }

    const q = questions[currentIndex];
    $('#questionNumber').text(`Question ${currentIndex + 1} of ${questions.length}`);
    $('#scrambledSentence').text(q.scrambled);
    $('#answerText').text(q.correct);
    
    // Hide answer section and reset buttons - NO SCROLLING
    $('#answerSection').hide();
    $('#showAnswerBtn').removeClass('hidden');
    $('#nextBtn').addClass('hidden');
}

function showTimesUpModal() {
    clearTimeout(timerTimeout);
    $('#timesUpModal').fadeIn(300).css('display', 'flex');
    $('.timer-bar').css('animation-play-state', 'paused');
}

function showCompleteModal() {
    $('#completeModal').fadeIn(300).css('display', 'flex');
}

$('#showAnswerBtn').on('click', function () {
    // Just show the answer - NO SCROLLING
    $('#answerSection').slideDown(200);
    $(this).addClass('hidden');
    $('#nextBtn').removeClass('hidden');
});

$('#nextBtn').on('click', function () {
    currentIndex++;
    showQuestion();
});

$('#modalOkBtn, #completeOkBtn').on('click', function() {
    location.href = 'index.html';
});

window.addEventListener('beforeunload', function() {
    clearTimeout(timerTimeout);
});
</script>

</body>
</html>
